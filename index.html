<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevClub</title>
    <link rel="stylesheet" href="css/base.css">
</head>
<body>

<!-- Hero Section -->
<!-- ============================== -->

<section class="hero">
<!-- Reservado para futura animação de partículas de fundo e etc -->
    <div class="hero__background">

        <div class="hero__particles"></div>
        <div class="hero__gradient"></div>
        <div class="hero__glow"></div>

    </div>

  <!-- Hero Container -->
  <div class="hero__container">

    <!-- Hero Content -->
    <div class="hero__content">

      <!-- Texto pequeno de apoio acima do título -->
      <span class="hero__eyebrow">YOUR JOURNEY STARTS HERE</span>

      <!-- Título principal da Hero -->
      <h1 class="hero__title">Code the Future. Build Your Legacy.</h1>

      <!-- Parágrafo de apoio explicando a proposta -->
      <p class="hero__description">
        Uma experiência além da tela. Tecnologia, design e código
        se encontram em um novo universo digital.
      </p>

      <!-- Hero Actions -->
      <!-- Bloco com os dois botões de ação da Hero -->
      <div class="hero__actions">
        <a href="#journey" class="button button--primary">Explorar</a>
        <a href="#about" class="button button--secondary">Saiba mais</a>
      </div>

    </div>

    <!-- Hero Visual -->
    <!-- Área reservada para futura animação 3D -->
    <div class="hero__visual">
        <div class="hero__scene">
            <!-- Futuro Canvas-->
        </div>
    </div>

  </div>

</section>

<script type="module" src="js/main.js"></script>
</body>
</html>
